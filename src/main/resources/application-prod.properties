# Production Configuration for Render Deployment
# Database - Uses environment variables set in Render dashboard
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server port - Render sets PORT env var
server.port=${PORT:8081}

# JWT Configuration
app.jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidationPurposesOnlyChangeThisInProduction}
app.jwt.expiration=86400000

